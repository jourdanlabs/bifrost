<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BIFROST Edge — Options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 24px auto; padding: 0 16px; }
      h1 { font-size: 18px; }
      label { display: block; font-size: 12px; color: #4b5563; margin-top: 12px; }
      input[type=text] { width: 100%; padding: 8px; box-sizing: border-box;
                         border: 1px solid #d1d5db; border-radius: 4px; }
      button { margin-top: 12px; padding: 8px 14px; font-size: 13px;
               background: #111827; color: white; border: 0; border-radius: 4px; cursor: pointer; }
      .row { display: flex; gap: 8px; align-items: center; }
      .ok { color: #047857; font-size: 12px; }
      .err { color: #b91c1c; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>BIFROST Edge</h1>
    <p>Configure the COSMIC-lite endpoint your browser sends AI output to for verification.</p>
    <label for="endpoint">API endpoint</label>
    <input id="endpoint" type="text" placeholder="http://localhost:8787/verify" />
    <div class="row">
      <button id="save">Save</button>
      <button id="test">Test</button>
      <span id="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
