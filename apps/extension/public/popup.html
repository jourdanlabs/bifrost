<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BIFROST Edge</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 12px; width: 260px; }
      h1 { margin: 0 0 4px 0; font-size: 14px; }
      p { margin: 0 0 8px 0; font-size: 12px; color: #4b5563; }
      label { display: block; font-size: 11px; color: #6b7280; margin-top: 8px; }
      input { width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 12px;
              border: 1px solid #d1d5db; border-radius: 4px; }
      button { margin-top: 10px; width: 100%; padding: 6px 8px; font-size: 12px;
               background: #111827; color: white; border: 0; border-radius: 4px; cursor: pointer; }
      .ok { color: #047857; font-size: 11px; }
      .err { color: #b91c1c; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>BIFROST Edge</h1>
    <p>AI generates. BIFROST verifies.</p>
    <label for="endpoint">API endpoint</label>
    <input id="endpoint" type="text" placeholder="http://localhost:8787/verify" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
